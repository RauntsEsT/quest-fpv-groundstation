<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest FPV Ground Station — Tööplaan</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --green: #3fb950;
    --green-dim: #1a4d23;
    --blue: #58a6ff;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --text-bright: #f0f6fc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .header h1 { font-size: 18px; color: var(--text-bright); display: flex; align-items: center; gap: 8px; }
  .header h1 span { font-size: 22px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { background: var(--border); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: #3a4149; border-color: #58a6ff; color: var(--text-bright); }
  .btn-green { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .btn-green:hover { background: #2a6b33; }
  .btn-orange { background: #3a2e10; border-color: var(--orange); color: var(--orange); }

  .sync-status { font-size: 11px; padding: 3px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; }
  .sync-ok { background: var(--green-dim); color: var(--green); }
  .sync-err { background: #3a1a1a; color: var(--red); }
  .sync-loading { background: #1a3a5c; color: var(--blue); }
  .sync-local { background: #3a2e10; color: var(--orange); }

  .progress-bar-wrap { margin-top: 12px; }
  .progress-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; color: var(--text-dim); }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), #58a6ff); border-radius: 3px; transition: width 0.4s; }

  .filters { display: flex; gap: 6px; padding: 12px 20px; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--bg); }
  .filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .filter-btn.active { background: var(--card); color: var(--text-bright); border-color: var(--blue); }
  .filter-btn:hover { color: var(--text-bright); }

  .main { max-width: 900px; margin: 0 auto; padding: 20px; }

  .phase { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
  .phase-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none; }
  .phase-header:hover { background: #1c2128; }
  .phase-emoji { font-size: 20px; width: 28px; text-align: center; }
  .phase-info { flex: 1; }
  .phase-title { font-size: 15px; font-weight: 600; color: var(--text-bright); }
  .phase-subtitle { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .phase-meta { display: flex; align-items: center; gap: 10px; }
  .phase-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .badge-done { background: var(--green-dim); color: var(--green); }
  .badge-active { background: #1a3a5c; color: var(--blue); }
  .badge-pending { background: #2a2219; color: var(--orange); }
  .badge-blocked { background: #3a1a1a; color: var(--red); }
  .phase-progress-mini { font-size: 12px; color: var(--text-dim); }
  .chevron { color: var(--text-dim); transition: transform 0.2s; font-size: 12px; }
  .phase.open .chevron { transform: rotate(90deg); }
  .phase-progress-bar { height: 3px; background: var(--border); }
  .phase-progress-fill { height: 100%; transition: width 0.4s; }

  .task-list { display: none; padding: 0 0 8px; }
  .phase.open .task-list { display: block; }

  .task { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; transition: background 0.1s; }
  .task:hover { background: #1c2128; }
  .task.filtered-out { display: none; }
  .task-status-btn { width: 22px; height: 22px; border-radius: 50%; border: 2px solid; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.15s; background: transparent; }
  .task-status-btn:hover { transform: scale(1.15); }
  .status-pending .task-status-btn { border-color: var(--border); color: transparent; }
  .status-pending .task-status-btn:hover { border-color: var(--text-dim); }
  .status-inprogress .task-status-btn { border-color: var(--blue); color: var(--blue); background: #1a3a5c; }
  .status-done .task-status-btn { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .status-blocked .task-status-btn { border-color: var(--red); color: var(--red); background: #3a1a1a; }
  .task-body { flex: 1; min-width: 0; }
  .task-name { color: var(--text-bright); line-height: 1.4; }
  .status-done .task-name { color: var(--text-dim); text-decoration: line-through; }
  .task-desc { font-size: 12px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }
  .task-actions { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
  .task-link { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--blue); cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s; }
  .task-link:hover { background: #1a3a5c; border-color: var(--blue); }
  .task-note-btn { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.15s; }
  .task-note-btn:hover { color: var(--text-bright); border-color: var(--text-dim); }
  .task-note-btn.has-note { color: var(--orange); border-color: var(--orange); }
  .task-notes { display: none; margin-top: 8px; }
  .task-notes.open { display: block; }
  .task-notes textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px; font-size: 12px; font-family: inherit; resize: vertical; min-height: 60px; outline: none; }
  .task-notes textarea:focus { border-color: var(--blue); }

  .task-note-btn.has-open { color: var(--orange); border-color: var(--orange); }
  .task-chat { display: none; margin-top: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; }
  .task-chat.open { display: block; }
  .chat-thread { max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .chat-empty { font-size: 12px; color: var(--text-dim); padding: 4px 0; }
  .chat-msg { padding: 6px 10px; border-radius: 8px; font-size: 12px; line-height: 1.4; max-width: 90%; }
  .chat-msg .chat-author { font-size: 10px; font-weight: 600; margin-bottom: 2px; opacity: 0.7; }
  .chat-msg .chat-time { font-size: 10px; opacity: 0.5; margin-top: 2px; }
  .chat-msg.chat-user { align-self: flex-end; background: #1a3a5c; color: var(--text-bright); }
  .chat-msg.chat-claude { align-self: flex-start; background: var(--green-dim); color: var(--text-bright); }
  .chat-msg.chat-user.chat-unresolved { border: 1px solid var(--orange); }
  .chat-input-row { display: flex; gap: 6px; }
  .chat-input-row input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 10px; font-size: 12px; outline: none; }
  .chat-input-row input:focus { border-color: var(--blue); }

  .stats-bar { display: flex; gap: 16px; padding: 12px 20px; background: var(--card); border-top: 1px solid var(--border); flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 10px; max-width: 600px; width: 100%; max-height: 85vh; overflow-y: auto; }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-body { padding: 20px; }
  .modal pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; color: var(--text); }
  .modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; padding: 4px; }
  .modal-close:hover { color: var(--text-bright); }

  .setup-field { margin-bottom: 16px; }
  .setup-field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .setup-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 13px; outline: none; }
  .setup-field input:focus { border-color: var(--blue); }

  .login-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
  .login-screen.active { display: flex; }
  .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; max-width: 360px; width: 100%; }
  .login-logo { font-size: 40px; text-align: center; margin-bottom: 8px; }
  .login-title { font-size: 20px; font-weight: 600; color: var(--text-bright); text-align: center; margin-bottom: 4px; }
  .login-sub { font-size: 12px; color: var(--text-dim); text-align: center; margin-bottom: 24px; }
  .login-field { margin-bottom: 14px; }
  .login-field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .login-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text-bright); padding: 10px 12px; font-size: 14px; outline: none; }
  .login-field input:focus { border-color: var(--blue); }
  .login-btn { width: 100%; padding: 10px; border-radius: 6px; border: none; background: var(--blue); color: #0d1117; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: opacity 0.15s; }
  .login-btn:hover { opacity: 0.85; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-err { font-size: 12px; color: var(--red); margin-top: 10px; text-align: center; min-height: 16px; }

  @media (max-width: 600px) {
    .main { padding: 12px; }
    .header { padding: 12px; }
    .filters { padding: 8px 12px; }
    .phase-header { padding: 12px; }
    .task { padding: 10px 12px; }
    .header h1 { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">📡</div>
    <div class="login-title">Quest FPV Tracker</div>
    <div class="login-sub">Logi sisse et jätkata</div>
    <div class="login-field">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="rauno@gmail.com" autocomplete="email" />
    </div>
    <div class="login-field">
      <label>Parool</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Logi sisse</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div class="header">
  <div class="header-top">
    <h1><span>📡</span> Quest FPV Ground Station — Tööplaan</h1>
    <div class="header-actions">
      <span id="sync-indicator" class="sync-status sync-loading">⟳ Laeb...</span>
      <button class="btn" onclick="exportStatus()">📋 Kopeeri Claude'ile</button>
      <button class="btn" onclick="doLogout()">⇥ Välju</button>
      <button class="btn btn-green" onclick="openRepo()">⬡ GitHub</button>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Üldine progress</span>
      <span id="overall-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="overall-fill" style="width:0%"></div></div>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">Kõik</button>
  <button class="filter-btn" onclick="setFilter('inprogress', this)">🔵 Töös</button>
  <button class="filter-btn" onclick="setFilter('pending', this)">⏳ Ootel</button>
  <button class="filter-btn" onclick="setFilter('done', this)">✅ Tehtud</button>
  <button class="filter-btn" onclick="setFilter('blocked', this)">🔴 Blokeeritud</button>
</div>

<div class="main" id="phases-container"></div>
<div class="stats-bar" id="stats-bar"></div>

<div class="modal-bg" id="export-modal">
  <div class="modal">
    <div class="modal-header">
      <strong>📋 Kopeeri Claude'ile</strong>
      <button class="modal-close" onclick="closeModal('export-modal')">✕</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-dim);font-size:12px;margin-bottom:12px;">Kopeeri see tekst Claude sessiooni algusesse.</p>
      <pre id="export-text"></pre>
      <button class="btn btn-green" style="margin-top:12px;width:100%" onclick="copyExport()">📋 Kopeeri lõikepuhvrisse</button>
    </div>
  </div>
</div>

<script>
const REPO = 'https://github.com/RauntsEsT/quest-fpv-groundstation/blob/main/';
const PROJECT_SLUG = 'quest-fpv-groundstation';

const PHASES = [
  {
    id: 'p0', emoji: '🏗️', name: 'Infrastruktuur', subtitle: 'RPi5, teenus, GitHub, Android rakendus',
    tasks: [
      { id: 't0_1', name: 'GitHub repo loomine', desc: 'RauntsEsT/quest-fpv-groundstation', status: 'done' },
      { id: 't0_2', name: 'RPi5 seadistamine (Ubuntu, Python, teenus)', desc: 'quest-groundstation.service, autostart, SSH pi@192.168.1.145', status: 'done' },
      { id: 't0_3', name: 'Web UI (index.html)', desc: 'FastAPI + WebSocket, Fly/Settings/Recordings lehed', status: 'done' },
      { id: 't0_4', name: 'Android rakendus (Capacitor)', desc: 'quest-fpv-app repo, APK deploy OTA, multi-groundstation launcher', status: 'done' },
      { id: 't0_5', name: 'CLAUDE.md + RESEARCH.md dokumentatsioon', desc: 'Kõik lahendatud probleemid ja leiud dokumenteeritud GitHubis', status: 'done', guide: REPO + 'RESEARCH.md' },
    ]
  },
  {
    id: 'p1', emoji: '📹', name: 'Video Stream', subtitle: 'USB capture card, latentsus, värvid',
    tasks: [
      { id: 't1_1', name: 'USB capture card /dev/video0 (USBTV007)', desc: 'Foxeer VRX composite → EasyCap → /dev/video0', status: 'done' },
      { id: 't1_2', name: 'PAL standard seadistus', desc: 'USBTV007 vaikimisi NTSC (3.58MHz), VRX väljastab PAL (4.43MHz) → -standard PAL ffmpeg argumendis', status: 'done', guide: REPO + 'RESEARCH.md' },
      { id: 't1_3', name: 'WebSocket video (madal latentsus)', desc: '/ws/video endpoint, asyncio.Queue(maxsize=1), thread_queue_size=1', status: 'done' },
      { id: 't1_4', name: 'Auto-reconnect watchdog', desc: '8s ilma kaadrita → USB reset + ffmpeg restart. PAL taastamine pärast USB reset-i', status: 'done' },
      { id: 't1_5', name: 'Salvestamine MP4 (H.264)', desc: 'Recordings lehel playback inline modalis', status: 'done' },
    ]
  },
  {
    id: 'p2', emoji: '🎮', name: 'RC Juhtimine', subtitle: 'PPM, CRSF, kanal mapping, failsafe',
    tasks: [
      { id: 't2_1', name: 'PPM väljund GPIO18', desc: 'RP1 mmap, SCHED_FIFO prio 99, CPU3 affinity. ppm_timing.so C-teek', status: 'done', guide: REPO + 'WIRING.md' },
      { id: 't2_2', name: 'TBS Crossfire Micro TX v2 link', desc: 'JR bay moodul, PPM input pin1, CRSF telemetria pin5. RF link kinnitatud roheliste LEDdidega', status: 'done', guide: REPO + 'WIRING.md' },
      { id: 't2_3', name: 'Kanal mapping AETR (CH3/CH4 swap)', desc: 'Crossfire SWAPIB: PPM CH3→INAV CH4 (yaw), PPM CH4→INAV CH3 (throttle). Kinnitatud MSP mõõtmisega', status: 'done' },
      { id: 't2_4', name: 'Failsafe seadistamine', desc: 'ch4:-1 (throttle min), ch1-3:0 (center). FAILSAFE_CHANNELS tuple', status: 'done' },
      { id: 't2_5', name: 'Android joystick kontroller', desc: 'UDP:5005, expo 0.3, dead_zone 0.04, 8 kanalit', status: 'done' },
      { id: 't2_6', name: 'RC-link taastamine pärast SmartPort kiibi lisamist', desc: 'Katki alates kiibi lisamisest. Isoleeritud: moodul+RX+FC+RF kõik OK (töötab tavalise puldiga). Järgmine: TBS Agent RC input mode kontroll.', status: 'blocked', guide: REPO + 'RESEARCH.md' },
    ]
  },
  {
    id: 'p3', emoji: '📊', name: 'SmartPort Telemeetria', subtitle: 'FrSky S.Port, inverter, HUD andmed',
    tasks: [
      { id: 't3_1', name: 'SN74LVC1G04 inverter ühendamine', desc: 'JR pin5 → inverter IN → GPIO13 (ttyAMA4 RXD4). RPi5 pinctrl kinnitas: GPIO12=TXD4, GPIO13=RXD4', status: 'done', guide: REPO + 'WIRING.md' },
      { id: 't3_2', name: 'Betaflight FC SmartPort seadistus', desc: 'Ports → UART X → Telemetry Output → SmartPort. Baud 57600', status: 'pending' },
      { id: 't3_3', name: 'SmartPort raw byte test', desc: 'Stop teenus → python3 serial.read ttyAMA4 → peaks saama >0 baiti', status: 'inprogress' },
      { id: 't3_4', name: 'Telemeetria parsemine (pinge, GPS, alt)', desc: 'SP_VFAS, SP_GPS_LAT/LON, SP_ALT, SP_T1/T2 sensor IDs', status: 'pending', guide: REPO + 'groundstation/telemetry_smartport.py' },
      { id: 't3_5', name: 'HUD telemeetria kuva', desc: 'Fly lehel: pinge, GPS koord, kõrgus, kiirus, flight mode', status: 'pending' },
    ]
  },
  {
    id: 'p4', emoji: '📶', name: 'RSSI', subtitle: 'ADS1115 ADC, Foxeer VRX analoog signaal',
    tasks: [
      { id: 't4_1', name: 'ADS1115 ADC ostmine', desc: 'I2C ADC, 16-bit, 4 kanalit. Foxeer Wildfire pin2 (RSSI) → A0', status: 'pending', guide: REPO + 'WIRING.md' },
      { id: 't4_2', name: 'ADS1115 I2C ühendamine', desc: 'SDA→GPIO2 (pin3), SCL→GPIO3 (pin5), VDD→3V3, ADDR→GND (aadress 0x48)', status: 'pending', guide: REPO + 'WIRING.md' },
      { id: 't4_3', name: 'RSSI lugemine Python koodis', desc: 'smbus2 teek, ADS1115 A0 kanal, 0-3.3V → protsent', status: 'pending' },
      { id: 't4_4', name: 'RSSI HUD kuvamine', desc: 'Fly lehel signaalitugevus protsendina + ribana', status: 'pending' },
    ]
  },
  {
    id: 'p5', emoji: '📻', name: 'VRX Kanali Muutmine', subtitle: 'Foxeer Wildfire kanalivalik',
    tasks: [
      { id: 't5_1', name: 'Foxeer Wildfire UART protokoll tuvastamine', desc: 'Praegu foxeer_uart draiver olemas aga tegelik protokoll teadmata', status: 'inprogress' },
      { id: 't5_2', name: 'RTC6715 SPI kanali kontroll test', desc: 'GPIO8 (CS), GPIO10 (MOSI), GPIO11 (CLK) bit-bang. Konflikt GPIO8 SPI CS-ga', status: 'pending', guide: REPO + 'WIRING.md' },
      { id: 't5_3', name: 'Kanalivalik Web UI-s töötab', desc: 'Band/channel muutmine rakendusest, VRX reageerib', status: 'pending' },
    ]
  },
  {
    id: 'p6', emoji: '🌐', name: 'Võrk & Kaugjuurdepääs', subtitle: 'AP+STA mode, hotspot, mitmevõrgu tugi',
    tasks: [
      { id: 't6_1', name: 'FPV-Ground WiFi hotspot (AP mode)', desc: 'SSID: FPV-Ground, parool: fpvground1, IP: 10.0.0.1. Home Claude seadistas', status: 'done' },
      { id: 't6_2', name: 'AP+STA samaaegselt (hotspot + WiFi klient)', desc: 'RPi5 Broadcom WiFi toetab. wlan0 STA: EWG/kodu WiFi. wlan0 AP: FPV-Ground alati peal', status: 'inprogress' },
      { id: 't6_3', name: 'EWG töökoha WiFi salvestamine', desc: 'nmcli connection add → autoconnect-priority 10. SSH kaudu 10.0.0.1 → lisa WiFi', status: 'inprogress' },
      { id: 't6_4', name: 'Android rakendus: 3 ühendust', desc: 'Töö: 192.168.1.145 | Kodu: 192.168.1.157 | Väli/AP: 10.0.0.1', status: 'done' },
    ]
  },
];

const STATUS_CYCLE = ['pending', 'inprogress', 'done', 'blocked'];
const STATUS_ICONS = { pending: '○', inprogress: '●', done: '✓', blocked: '✕' };
const STATUS_LABELS = { pending: 'Ootel', inprogress: 'Töös', done: 'Tehtud', blocked: 'Blokeeritud' };
const PHASE_COLORS = { done: '#3fb950', inprogress: '#58a6ff', pending: '#d29922', blocked: '#f85149' };

let sb = null;
let state = {};
let comments = {};
let currentFilter = 'all';
let syncMode = 'local';

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function showLogin() { document.getElementById('login-screen').classList.add('active'); }
function hideLogin() { document.getElementById('login-screen').classList.remove('active'); }

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  if (!email || !pw) { err.textContent = 'Täida mõlemad väljad.'; return; }
  if (!sb) { err.textContent = 'Supabase pole seadistatud.'; return; }
  btn.disabled = true; btn.textContent = 'Sisselogimine...'; err.textContent = '';

  hideLogin();
  await loadStateFromSupabase();
  await loadComments();

}

async function loadStateFromSupabase() {

async function saveTaskToSupabase(taskId) {
  if (!sb) return;
  const ts = state[taskId] || {};
  try {
    const { error } = await sb.from('task_states').upsert({
      project_slug: PROJECT_SLUG, task_id: taskId,
      status: ts.status || 'pending', notes: ts.notes || '',
      updated_at: new Date().toISOString()
    }, { onConflict: 'project_slug,task_id' });
    if (error) throw error;
    setSyncStatus('ok', '✓ Salvestatud');

function loadStateLocal() {

function saveStateLocal() { localStorage.setItem('fpv_gs_state', JSON.stringify(state)); }

async function loadComments() {
  if (!sb) return;
  try {
    const { data, error } = await sb.from('task_comments')
      .select('id,task_id,author,body,resolved,created_at')
      .eq('project_slug', PROJECT_SLUG)
      .order('created_at', { ascending: true });

function getComments(taskId) { return comments[taskId] || []; }
function hasOpenComment(taskId) { return getComments(taskId).some(c => c.author === 'user' && !c.resolved); }

function toggleChat(taskId) {

function getStatus(taskId, defaultStatus) { return (state[taskId] && state[taskId].status) || defaultStatus; }
function getNotes(taskId) { return (state[taskId] && state[taskId].notes) || ''; }

async function cycleStatus(taskId, defaultStatus) {
  const cur = getStatus(taskId, defaultStatus);
  const idx = STATUS_CYCLE.indexOf(cur);
  const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  if (!state[taskId]) state[taskId] = {};
  state[taskId].status = next;
  if (syncMode === 'supabase') await saveTaskToSupabase(taskId);
  else saveStateLocal();
  render();
}

let noteTimer = null;
async function saveNote(taskId, val) {
  if (!state[taskId]) state[taskId] = {};
  state[taskId].notes = val;
  clearTimeout(noteTimer);
  noteTimer = setTimeout(async () => {
    if (syncMode === 'supabase') await saveTaskToSupabase(taskId);
    else saveStateLocal();
  }, 800);
  renderStats();
}

function setSyncStatus(type, msg) {
  const el = document.getElementById('sync-indicator');
  el.className = 'sync-status sync-' + type;
  el.textContent = msg;
}

function toggleNotes(taskId) {
  const el = document.getElementById('notes_' + taskId);
  el.classList.toggle('open');
  if (el.classList.contains('open')) el.querySelector('textarea').focus();
}
function togglePhase(phaseId) { document.getElementById('phase_' + phaseId).classList.toggle('open'); }
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}
function applyFilter() {
  document.querySelectorAll('.task').forEach(el => {
    el.classList.toggle('filtered-out', currentFilter !== 'all' && el.dataset.status !== currentFilter);
  });
}

function phaseStatus(phase) {
  const statuses = phase.tasks.map(t => getStatus(t.id, t.status));
  if (statuses.every(s => s === 'done')) return 'done';
  if (statuses.some(s => s === 'blocked')) return 'blocked';
  if (statuses.some(s => s === 'inprogress' || s === 'done')) return 'inprogress';
  return 'pending';
}
function phaseProgress(phase) {
  const done = phase.tasks.filter(t => getStatus(t.id, t.status) === 'done').length;
  return { done, total: phase.tasks.length, pct: Math.round(done / phase.tasks.length * 100) };
}
function overallProgress() {
  let done = 0, total = 0;
  PHASES.forEach(p => p.tasks.forEach(t => { total++; if (getStatus(t.id, t.status) === 'done') done++; }));
  return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
}

function render() {
  const container = document.getElementById('phases-container');
  container.innerHTML = '';
  PHASES.forEach(phase => {
    const ps = phaseStatus(phase);
    const pp = phaseProgress(phase);
    const badgeClass = 'badge-' + (ps === 'inprogress' ? 'active' : ps);
    const isOpen = ps === 'inprogress';

    const taskHtml = phase.tasks.map(task => {
      const status = getStatus(task.id, task.status);
      const notes = getNotes(task.id);
      const hasNotes = notes.trim().length > 0;
      const guideBtn = task.guide ? `<a href="${task.guide}" target="_blank" class="task-link">📖 Juhend</a>` : '';
      const notesBtnClass = 'task-note-btn' + (hasNotes ? ' has-note' : '');

      const taskComments = getComments(task.id);
      const openChat = hasOpenComment(task.id);
      const chatBtnClass = 'task-note-btn' + (openChat ? ' has-open' : (taskComments.length ? ' has-note' : ''));
      const chatLabel = taskComments.length ? `💬 Vestlus (${taskComments.length})` : '💬 Vestlus';
      const chatThread = taskComments.length
        ? taskComments.map(c => {
            const who = c.author === 'user' ? 'Sina' : 'Claude';
            const unresolved = c.author === 'user' && !c.resolved ? ' chat-unresolved' : '';
            const time = new Date(c.created_at).toLocaleString('et-EE', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
            return `<div class="chat-msg chat-${c.author}${unresolved}">
              <div class="chat-author">${who}${c.author === 'user' && !c.resolved ? ' · ootab vastust' : ''}</div>
              <div class="chat-text">${escapeHtml(c.body)}</div>
              <div class="chat-time">${time}</div>
            </div>`;
          }).join('')
        : '<div class="chat-empty">Vestlust pole veel. Kirjuta siia muudatussoov ja Claude teeb selle projektis järgmisel sessioonil.</div>';

      return `<div class="task status-${status}" data-status="${status}" data-id="${task.id}">
        <button class="task-status-btn" onclick="cycleStatus('${task.id}','${task.status}')" title="${STATUS_LABELS[status]} → klõpsa">${STATUS_ICONS[status]}</button>
        <div class="task-body">
          <div class="task-name">${task.name}</div>
          ${task.desc ? `<div class="task-desc">${task.desc}</div>` : ''}
          <div class="task-actions">
            ${guideBtn}
            <button class="${notesBtnClass}" onclick="toggleNotes('${task.id}')">${hasNotes ? '📝 Märkus' : '+ Märkus'}</button>
            <button class="${chatBtnClass}" onclick="toggleChat('${task.id}')">${chatLabel}</button>
          </div>
          <div class="task-notes${hasNotes ? ' open' : ''}" id="notes_${task.id}">
            <textarea placeholder="Märkus..." onchange="saveNote('${task.id}', this.value)">${notes}</textarea>
          </div>
          <div class="task-chat" id="chat_${task.id}">
            <div class="chat-thread">${chatThread}</div>
            <div class="chat-input-row">
              <input type="text" id="chat_input_${task.id}" placeholder="Kirjuta muudatussoov..." onkeydown="if(event.key==='Enter'){event.preventDefault();sendComment('${task.id}');}" />
              <button class="btn btn-green" onclick="sendComment('${task.id}')">➤</button>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    const div = document.createElement('div');
    div.className = 'phase' + (isOpen ? ' open' : '');
    div.id = 'phase_' + phase.id;
    div.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${phase.id}')">
        <span class="phase-emoji">${phase.emoji}</span>
        <div class="phase-info">
          <div class="phase-title">${phase.name}</div>
          <div class="phase-subtitle">${phase.subtitle}</div>
        </div>
        <div class="phase-meta">
          <span class="phase-badge ${badgeClass}">${STATUS_LABELS[ps]}</span>
          <span class="phase-progress-mini">${pp.done}/${pp.total}</span>
          <span class="chevron">▶</span>
        </div>
      </div>
      <div class="phase-progress-bar">
        <div class="phase-progress-fill" style="width:${pp.pct}%;background:${PHASE_COLORS[ps]}"></div>
      </div>
      <div class="task-list">${taskHtml}</div>`;
    container.appendChild(div);
  });
  renderStats();
  applyFilter();
}

function renderStats() {
  let counts = { pending: 0, inprogress: 0, done: 0, blocked: 0 };
  PHASES.forEach(p => p.tasks.forEach(t => counts[getStatus(t.id, t.status)]++));
  const op = overallProgress();
  document.getElementById('overall-fill').style.width = op.pct + '%';
  document.getElementById('overall-pct').textContent = op.pct + '% (' + op.done + '/' + op.total + ')';
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-dot" style="background:#3fb950"></div><span>${counts.done} tehtud</span></div>
    <div class="stat"><div class="stat-dot" style="background:#58a6ff"></div><span>${counts.inprogress} töös</span></div>
    <div class="stat"><div class="stat-dot" style="background:#d29922"></div><span>${counts.pending} ootel</span></div>
    <div class="stat"><div class="stat-dot" style="background:#f85149"></div><span>${counts.blocked} blokeeritud</span></div>
    <div class="stat" style="margin-left:auto;color:var(--text-dim)">Uuendatud: ${new Date().toLocaleString('et-EE')}</div>`;
}

function exportStatus() {
  const op = overallProgress();
  let lines = [`QUEST FPV GROUND STATION — Olek (${new Date().toLocaleDateString('et-EE')})\n`];
  lines.push(`Progress: ${op.done}/${op.total} ülesannet (${op.pct}%)\n`);
  const inP = [], blk = [], next = [];
  PHASES.forEach(p => p.tasks.forEach(t => {
    const s = getStatus(t.id, t.status);
    if (s === 'inprogress') inP.push(`  • [${p.emoji}] ${t.name}`);
    if (s === 'blocked') blk.push(`  • [${p.emoji}] ${t.name}`);
    if (s === 'pending' && next.length < 5) next.push(`  • [${p.emoji}] ${t.name}`);
  }));
  if (inP.length) lines.push(`\nPRAEGU TÖÖS:\n${inP.join('\n')}`);
  if (blk.length) lines.push(`\nBLOKEERITUD:\n${blk.join('\n')}`);
  if (next.length) lines.push(`\nJÄRGMISED SAMMUD:\n${next.join('\n')}`);
  const notes = [];
  PHASES.forEach(p => p.tasks.forEach(t => { const n = getNotes(t.id); if (n.trim()) notes.push(`  [${t.name}]: ${n.trim()}`); }));
  if (notes.length) lines.push(`\nMÄRKUSED:\n${notes.join('\n')}`);
  lines.push(`\nGitHub: https://github.com/RauntsEsT/quest-fpv-groundstation`);
  document.getElementById('export-text').textContent = lines.join('\n');
  document.getElementById('export-modal').classList.add('open');
}
function copyExport() {
  navigator.clipboard.writeText(document.getElementById('export-text').textContent).then(() => {
    const btn = document.querySelector('#export-modal .btn-green');
    btn.textContent = '✅ Kopeeritud!';
    setTimeout(() => btn.textContent = '📋 Kopeeri lõikepuhvrisse', 2000);
  });
}

document.querySelectorAll('.modal-bg').forEach(m => m.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); }));

async function init() {
  initSupabase();
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'PASSWORD_RECOVERY') showLogin();
  });
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    hideLogin();
    await loadStateFromSupabase();
    await loadComments();
    render();
  } else {
    setSyncStatus('local', '🔒 Logi sisse');
    loadStateLocal();
    render();
    showLogin();
  }
}

init();
